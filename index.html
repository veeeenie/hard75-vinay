// ─── IndexedDB wrapper ───────────────────────────────────────────
const DB = (() => {
  let db = null;
  const init = () => new Promise((res, rej) => {
    const req = indexedDB.open("hard75_v2", 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("kv")) d.createObjectStore("kv");
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
  const get = key => new Promise(res => {
    if (!db) return res(null);
    const r = db.transaction("kv","readonly").objectStore("kv").get(key);
    r.onsuccess = () => res(r.result ?? null);
    r.onerror = () => res(null);
  });
  const set = (key, val) => new Promise(res => {
    if (!db) return res();
    const tx = db.transaction("kv","readwrite");
    tx.objectStore("kv").put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
  const del = key => new Promise(res => {
    if (!db) return res();
    const tx = db.transaction("kv","readwrite");
    tx.objectStore("kv").delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
  return { init, get, set, del };
})();

          {MEALS.map(([time,meal],i)=>(
            <div key={i} style={{ display:"flex", gap:14, padding:"7px 0", borderBottom:i<MEALS.length-1?"1px solid #161616":"none" }}>
              <div style={{ fontFamily:mono, fontSize:10, color:time.includes("→")?c.red:c.red, minWidth:52, flexShrink:0 }}>{time}</div>
              <div style={{ fontSize:12, color:"#777" }}>{meal}</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── TRACKER (75-day grid + photo gallery) ─────────────────────
  const Tracker = () => {
    const perfect = Object.values(tasks).filter(t=>t.every(Boolean)).length;
    const total   = Object.values(tasks).reduce((s,t)=>s+t.filter(Boolean).length,0);
    const photoCount = Object.keys(photos).length;

    return (
      <div>
        <div style={s.sec}>75-DAY GRID</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(15,1fr)", gap:3, marginBottom:16 }}>
          {Array.from({length:75},(_,i)=>i+1).map(d=>{
            const cnt = getDayCount(d);
            const isCur = d===curDay;
            const fut = !startDate||d>(curDay||0);
            const ph = photos[`d${d}`];
            const bg = cnt===6?c.green:cnt>0?c.orange:"#191919";
            return (
              <div key={d} style={{ position:"relative", aspectRatio:"1" }}>
                <div title={`Day ${d}: ${cnt}/6`}
                  style={{ width:"100%", height:"100%", background:ph?"transparent":bg, borderRadius:2, border:isCur?`2px solid ${c.red}`:"1px solid transparent", opacity:fut?0.2:1, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center", cursor:"default" }}>
                  {ph ? (
                    <img src={ph} alt={`D${d}`} style={{ width:"100%", height:"100%", objectFit:"cover", cursor:"pointer", filter:cnt===6?"none":"brightness(0.5)" }}
                      onClick={()=>setLB({day:d,src:ph})}/>
                  ) : (
                    <span style={{ fontFamily:mono, fontSize:7, color:cnt>0?"#000":"#2a2a2a" }}>{d}</span>
                  )}
                </div>
                {ph && cnt===6 && (
                  <div style={{ position:"absolute", top:1, right:1, width:6, height:6, borderRadius:"50%", background:c.green }}/>
                )}
              </div>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{ display:"flex", gap:16, marginBottom:20, flexWrap:"wrap" }}>
          {[[c.green,"All 6 complete"],[c.orange,"Partial"],[c.blue,"Photo day"]].map(([col,lbl])=>(
            <div key={lbl} style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:10, height:10, background:col, borderRadius:2 }}/>
              <span style={{ fontFamily:mono, fontSize:9, color:"#555" }}>{lbl}</span>
            </div>
          ))}
        </div>

        {/* Stats */}
        <div style={s.card}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, textAlign:"center" }}>
            {[[perfect,"Perfect","#2dcc7a"],[curDay?Math.min(curDay,75):0,"Elapsed","#4a9eff"],[total,"Tasks","#f5a623"],[photoCount,"Photos","#e63b2e"]].map(([v,l,col])=>(
              <div key={l}>
                <div style={{ fontFamily:bebas, fontSize:44, color:col, lineHeight:1 }}>{v}</div>
                <div style={{ fontFamily:mono, fontSize:8, color:"#444", letterSpacing:1, marginTop:3 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Photo strip */}
        {photoCount > 0 && (
          <>
            <div style={s.sec}>PROGRESS PHOTOS</div>
            <div className="photo-grid" style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:8 }}>
              {Object.entries(photos).sort((a,b)=>parseInt(a[0].slice(1))-parseInt(b[0].slice(1))).map(([k,src])=>{
                const d = parseInt(k.slice(1));
                return (
                  <div key={k} style={{ flexShrink:0, position:"relative", cursor:"pointer" }} onClick={()=>setLB({day:d,src})}>
                    <img src={src} alt={`Day ${d}`} style={{ width:80, height:80, objectFit:"cover", borderRadius:3, display:"block" }}/>
                    <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"#000b", padding:"3px 4px", fontFamily:mono, fontSize:8, color:c.text, textAlign:"center", borderRadius:"0 0 3px 3px" }}>D{d}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ fontFamily:mono, fontSize:10, color:"#333", marginTop:8, marginBottom:12 }}>Tap any photo to enlarge</div>
          </>
        )}

        <div style={{ marginTop:8 }}>
          <button style={s.btnSm} onClick={async()=>{
            if (window.confirm("Reset ALL progress, photos and data? Cannot be undone.")) {
              setSD(null); setTasks({}); setPhotos({});
              await DB.del("start"); await DB.del("tasks"); await DB.del("photos");
            }
          }}>Reset All Data</button>
        </div>
      </div>
    );
  };

  // ── ANALYSIS ──────────────────────────────────────────────────
  const Analysis = () => (
    <div>
      <div style={s.sec}>3-REPORT TREND</div>
      <div style={s.warn}>
        <div style={{ fontFamily:mono, fontSize:9, color:c.red, letterSpacing:2, marginBottom:8 }}>THE STORY SO FAR</div>
        <div style={{ fontSize:12, color:"#bbb", lineHeight:1.7 }}>
          <b style={{ color:c.orange }}>Sep 2025:</b> TSH 16.26 — thyroid severely underactive. Direct cause of rising LDL and falling HDL.<br/><br/>
          <b style={{ color:c.blue }}>Nov 2025:</b> Thyronorm brought TSH to 6.49. LDL jumped to 178 — cholesterol has its own momentum now.<br/><br/>
          <b style={{ color:c.green }}>Feb 2026:</b> TSH normalized (3.94 ✅). But LDL still 160, HDL crashed to 39.9, TG hit 165. Hard 75 starts now.
        </div>
      </div>

      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
        {BLOOD_MARKERS.map(m=>(
          <button key={m.key} style={s.chip(chartKey===m.key)} onClick={()=>setCK(m.key)}>{m.label.split(" ")[0]}</button>
        ))}
      </div>

      {sm && (
        <div style={s.card}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
            <div>
              <div style={{ fontFamily:bebas, fontSize:18, letterSpacing:2, color:"#888" }}>{sm.label}</div>
              <div style={{ fontFamily:mono, fontSize:9, color:"#555" }}>Target {sm.target} {sm.unit}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={s.lbl}>FEB '26</div>
              <div style={{ fontFamily:bebas, fontSize:40, color:sm.dir==="down"?(sm.f26>sm.tv?c.red:c.green):(sm.f26<sm.tv?c.red:c.green), lineHeight:1 }}>{sm.f26}</div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={chartData} margin={{top:4,right:4,left:-24,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1a1a"/>
              <XAxis dataKey="name" tick={{fill:"#555",fontFamily:mono,fontSize:9}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"#555",fontFamily:mono,fontSize:9}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={{background:"#111",border:"1px solid #222",fontFamily:mono,fontSize:11,color:c.text}}/>
              <ReferenceLine y={sm.tv} stroke={c.green} strokeDasharray="4 4"/>
              <Line type="monotone" dataKey={sm.key} stroke={c.red} strokeWidth={2.5} dot={{r:5,fill:c.red,stroke:c.bg,strokeWidth:2}} connectNulls/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      )}

      <div style={s.sec}>ALL MARKERS</div>
      {BLOOD_MARKERS.map(m => {
        const ok = m.dir==="down"?m.f26<=m.tv:m.f26>=m.tv;
        const worse = m.dir==="down"?m.f26>m.n25:m.f26<m.n25;
        return (
          <div key={m.key} style={{ ...s.card, padding:12, marginBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:6 }}>
              <div>
                <div style={{ fontSize:13, fontWeight:500 }}>{m.label}</div>
                <div style={{ fontFamily:mono, fontSize:9, color:"#555" }}>{m.target} {m.unit}</div>
              </div>
              <div style={{ display:"flex", gap:16, alignItems:"center" }}>
                {[["Sep",m.s25],["Nov",m.n25],["Feb",m.f26]].map(([nm,v])=>(
                  <div key={nm} style={{ textAlign:"center" }}>
                    <div style={{ fontFamily:mono, fontSize:8, color:"#444" }}>{nm}</div>
                    <div style={{ fontFamily:mono, fontSize:13, color:nm==="Feb"?(ok?c.green:c.red):"#666", fontWeight:nm==="Feb"?600:400 }}>{v}</div>
                  </div>
                ))}
                <span style={s.pill(ok?c.green:worse?c.red:c.orange)}>{ok?"✓ OK":worse?"↑ WORSE":"↓ BETTER"}</span>
              </div>
            </div>
          </div>
        );
      })}

      <div style={{ ...s.info, marginTop:8 }}>
        <div style={{ fontFamily:mono, fontSize:9, color:c.green, letterSpacing:2, marginBottom:6 }}>THYROID NOTE</div>
        <div style={{ fontSize:12, color:"#aaa", lineHeight:1.6 }}>
          TSH 16.26 → 6.49 → 3.94. Excellent. But optimal on Thyronorm is 1–2.5. Discuss dose increase from 75mcg → 88mcg with your doctor. This will give your lipids extra help.
        </div>
      </div>
    </div>
  );

  // ── PROTOCOL ──────────────────────────────────────────────────
  const Protocol = () => (
    <div>
      <div style={s.sec}>6 NON-NEGOTIABLE RULES</div>
      {TASKS.map((t,i)=>(
        <div key={i} style={{ ...s.card, padding:12, display:"flex", gap:12, alignItems:"center", marginBottom:8 }}>
          <div style={{ fontFamily:bebas, fontSize:28, color:c.red, width:24, lineHeight:1 }}>{i+1}</div>
          <div style={{ fontSize:20 }}>{t.icon}</div>
          <div>
            <div style={{ fontSize:13, fontWeight:600 }}>{t.label}</div>
            <div style={{ fontFamily:mono, fontSize:10, color:"#555", marginTop:1 }}>{t.detail}</div>
          </div>
        </div>
      ))}
      <div style={{ ...s.warn, textAlign:"center" }}>
        <div style={{ fontFamily:mono, fontSize:11, color:c.red, letterSpacing:2 }}>MISS ONE = RESTART DAY 1</div>
      </div>

      <div style={s.sec}>SUPPLEMENTS — CHEMIST NAMES</div>
      <div style={s.card}>
        {SUPPS.map((sp,i)=>(
          <div key={i} style={{ display:"flex", gap:10, padding:"12px 0", borderBottom:i<SUPPS.length-1?`1px solid #191919`:"none" }}>
            <div style={s.dot(i===0?c.green:c.blue)}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>{sp.name}</div>
              <div style={{ fontFamily:mono, fontSize:11, color:c.red, marginBottom:3 }}>📋 {sp.chemist}</div>
              <div style={{ fontFamily:mono, fontSize:10, color:"#555" }}>⏰ {sp.when}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={s.sec}>EAT THESE</div>
      <div style={s.card}>
        {EAT.map((item,i)=>(
          <div key={i} style={{ display:"flex", gap:8, padding:"7px 0", borderBottom:i<EAT.length-1?`1px solid #191919`:"none" }}>
            <div style={s.dot(c.green)}/><div style={{ fontSize:12, color:"#ccc" }}>{item}</div>
          </div>
        ))}
      </div>

      <div style={s.sec}>AVOID THESE</div>
      <div style={s.card}>
        {SKIP.map((item,i)=>(
          <div key={i} style={{ display:"flex", gap:8, padding:"7px 0", borderBottom:i<SKIP.length-1?`1px solid #191919`:"none" }}>
            <div style={s.dot(c.red)}/><div style={{ fontSize:12, color:"#ccc" }}>{item}</div>
          </div>
        ))}
      </div>

      <div style={s.sec}>WEEKLY WORKOUT</div>
      {WEEK.map((w,i)=>(
        <div key={i} style={{ ...s.card, padding:12, marginBottom:8 }}>
          <div style={{ display:"flex", gap:6, marginBottom:8 }}>
            <span style={s.pill(c.red)}>{w.day}</span>
            <span style={s.pill(c.blue)}>{w.type}</span>
          </div>
          <div style={{ fontFamily:mono, fontSize:10, color:"#444", marginBottom:4 }}>💪 INDOOR</div>
          <div style={{ fontSize:12, color:"#888", lineHeight:1.6, marginBottom:8 }}>{w.in}</div>
          <div style={{ fontFamily:mono, fontSize:10, color:"#444", marginBottom:4 }}>🌅 OUTDOOR</div>
          <div style={{ fontSize:12, color:"#888" }}>{w.out}</div>
        </div>
      ))}

      <div style={s.sec}>3 PHASES</div>
      {[
        {p:1,n:"ADAPTATION",d:"Days 1–25",col:c.orange,txt:"Expect soreness, fatigue, cravings. Form the habit. Don't restart."},
        {p:2,n:"MOMENTUM",d:"Days 26–50",col:c.blue,txt:"Habits built, energy rising. Push harder. Lipids already shifting."},
        {p:3,n:"DOMINATION",d:"Days 51–75",col:c.green,txt:"Max intensity. Identity shift complete. Book bloodwork Day 80–85."},
      ].map(ph=>(
        <div key={ph.p} style={{ ...s.card, borderLeft:`3px solid ${ph.col}`, marginBottom:8, padding:12 }}>
          <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:6 }}>
            <span style={s.pill(ph.col)}>PHASE {ph.p}</span>
            <span style={{ fontFamily:bebas, fontSize:16, color:ph.col, letterSpacing:2 }}>{ph.n}</span>
            <span style={{ fontFamily:mono, fontSize:9, color:"#444", marginLeft:"auto" }}>{ph.d}</span>
          </div>
          <div style={{ fontSize:12, color:"#999" }}>{ph.txt}</div>
        </div>
      ))}

      <div style={s.sec}>READING LIST</div>
      <div style={s.card}>
        {[["Days 1–25","Can't Hurt Me","David Goggins"],["Days 26–50","Atomic Habits","James Clear"],["Days 51–75","The Obstacle Is The Way","Ryan Holiday"]].map(([days,book,author],i)=>(
          <div key={i} style={{ display:"flex", gap:14, padding:"9px 0", borderBottom:i<2?`1px solid #191919`:"none" }}>
            <div style={{ fontFamily:mono, fontSize:9, color:c.red, minWidth:72 }}>{days}</div>
            <div>
              <div style={{ fontSize:13, fontWeight:600 }}>{book}</div>
              <div style={{ fontFamily:mono, fontSize:10, color:"#555" }}>{author}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={s.sec}>TARGET DAY 75</div>
      <div style={s.card}>
        {[["LDL","160.6","<130 mg/dL"],["HDL","39.9",">50 mg/dL"],["Triglycerides","165","<130 mg/dL"],["Vitamin D","22.4",">35 ng/mL"],["TSH","3.94","1–2.5 µIU/mL"]].map(([m,from,to],i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:i<4?`1px solid #191919`:"none" }}>
            <div style={{ fontFamily:mono, fontSize:10, color:"#888", minWidth:90 }}>{m}</div>
            <div style={{ fontFamily:mono, fontSize:12, color:c.red }}>{from}</div>
            <div style={{ color:"#333" }}>→</div>
            <div style={{ fontFamily:mono, fontSize:12, color:c.green, fontWeight:600 }}>{to}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── BLOODWORK ─────────────────────────────────────────────────
  const Bloodwork = () => (
    <div>
      <div style={s.sec}>BLOODWORK COMPARISON</div>
      <div style={s.info}>
        <div style={{ fontFamily:mono, fontSize:9, color:c.green, letterSpacing:2, marginBottom:6 }}>WHEN TO TEST</div>
        <div style={{ fontSize:12, color:"#aaa", lineHeight:1.6 }}>
          Book full panel on Day 80–85. Request: LDL Direct, HDL, Triglycerides, Total Cholesterol, Vitamin D 25-OH, Vitamin B12, TSH Ultrasensitive, HbA1c. Fast 10–12 hours.
        </div>
      </div>
      <div style={s.sec}>ENTER POST HARD-75 RESULTS</div>
      <div style={s.card}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {BLOOD_MARKERS.map(m=>(
            <div key={m.key}>
              <div style={s.lbl}>{m.label}</div>
              <input type="number" inputMode="decimal" placeholder={`Target: ${m.target}`} value={bw[m.key]||""} onChange={e=>saveBw(m.key,e.target.value)} style={s.inp}/>
            </div>
          ))}
        </div>
      </div>

      <div style={s.sec}>BEFORE → AFTER</div>
      {BLOOD_MARKERS.map(m=>{
        const before = m.f26;
        const after = bw[m.key] ? parseFloat(bw[m.key]) : null;
        const improved = after!==null?(m.dir==="down"?after<before:after>before):null;
        const hitTarget = after!==null?(m.dir==="down"?after<=m.tv:after>=m.tv):null;
        const change = after!==null?(after-before).toFixed(1):null;
        const pct = after!==null ? m.dir==="down"
          ? Math.min(100,Math.max(0,((before-after)/Math.max(1,before-m.tv))*100))
          : Math.min(100,Math.max(0,((after-before)/Math.max(1,m.tv-before))*100)) : 0;
        return (
          <div key={m.key} style={{ ...s.card, padding:12, marginBottom:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
              <div>
                <div style={{ fontSize:13, fontWeight:500 }}>{m.label}</div>
                <div style={{ fontFamily:mono, fontSize:9, color:"#555" }}>Target: {m.target} {m.unit}</div>
              </div>
              {hitTarget!==null && <span style={s.pill(hitTarget?c.green:c.red)}>{hitTarget?"HIT ✓":"KEEP GOING"}</span>}
            </div>
            <div style={{ display:"flex", gap:16, alignItems:"center" }}>
              <div>
                <div style={s.lbl}>BEFORE</div>
                <div style={{ fontFamily:bebas, fontSize:36, color:"#666", lineHeight:1 }}>{before}</div>
              </div>
              {after!==null ? (
                <>
                  <div style={{ fontFamily:bebas, fontSize:20, color:"#2a2a2a" }}>→</div>
                  <div>
                    <div style={s.lbl}>AFTER</div>
                    <div style={{ fontFamily:bebas, fontSize:36, color:improved?c.green:c.red, lineHeight:1 }}>{after}</div>
                  </div>
                  <div style={{ marginLeft:"auto", textAlign:"right" }}>
                    <div style={s.lbl}>CHANGE</div>
                    <div style={{ fontFamily:mono, fontSize:18, color:improved?c.green:c.red, fontWeight:600 }}>{parseFloat(change)>0?"+":""}{change}</div>
                  </div>
                </>
              ) : <div style={{ fontFamily:mono, fontSize:10, color:"#222", paddingLeft:12 }}>— enter result above</div>}
            </div>
            {after!==null && (
              <div style={{ ...s.bar, marginTop:10, marginBottom:0 }}>
                <div style={{ height:"100%", width:`${pct}%`, background:improved?c.green:c.red, borderRadius:2 }}/>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );

  const TABS = [
    {id:"today",label:"Today"},
    {id:"tracker",label:"75 Days"},
    {id:"analysis",label:"Analysis"},
    {id:"protocol",label:"Protocol"},
    {id:"bloodwork",label:"Bloodwork"},
  ];

  return (
    <div style={s.app}>
      {/* Hidden file input */}
      <input type="file" ref={fileRef} accept="image/*" onChange={onPhotoFile}/>

      {/* Header */}
      <div style={s.hdr}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={s.title}>HARD 75 — VINAY PAHAL</div>
            <div style={s.sub}>LIPID CORRECTION · BODY TRANSFORMATION</div>
          </div>
          {active && (
            <div style={{ textAlign:"right" }}>
              <div style={{ fontFamily:bebas, fontSize:40, color:c.text, lineHeight:1 }}>D{curDay}</div>
              <div style={{ background:phColor, color:"#000", fontFamily:mono, fontSize:8, padding:"2px 7px", borderRadius:2, letterSpacing:2 }}>P{phase}</div>
            </div>
          )}
        </div>
      </div>

      {/* Tab bar */}
      <div style={s.tabs}>
        {TABS.map(t=>(
          <button key={t.id} style={{ ...s.tab, ...(tab===t.id?s.tabOn:{}) }} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={s.body}>
        {tab==="today"    && <Today/>}
        {tab==="tracker"  && <Tracker/>}
        {tab==="analysis" && <Analysis/>}
        {tab==="protocol" && <Protocol/>}
        {tab==="bloodwork"&& <Bloodwork/>}
      </div>

      {/* Lightbox */}
      {lightbox && (
        <div style={{ position:"fixed", inset:0, background:"#000e", zIndex:999, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}
          onClick={()=>setLB(null)}>
          <div style={{ fontFamily:bebas, fontSize:20, color:c.text, letterSpacing:3, marginBottom:10 }}>DAY {lightbox.day}</div>
          <img src={lightbox.src} alt="" style={{ maxWidth:"92vw", maxHeight:"75vh", objectFit:"contain", borderRadius:3 }}/>
          <div style={{ fontFamily:mono, fontSize:10, color:"#555", marginTop:12 }}>Tap anywhere to close</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
